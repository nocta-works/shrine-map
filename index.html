<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全国神社マップ — 神宮・大社・一宮・二宮・名社１・名社２</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛩️</text></svg>">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic Medium', 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif;
      background: #1a1209;
      color: #f0e6c8;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
      border-bottom: 2px solid #6b3a1f;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px 14px;
      z-index: 1000;
      box-shadow: 0 2px 12px rgba(0,0,0,0.5);
      flex-wrap: wrap;
    }

    .torii-icon { font-size: 26px; filter: drop-shadow(0 0 6px rgba(220,80,30,0.6)); }

    header h1 {
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif;
      font-size: 17px;
      letter-spacing: 0.1em;
      color: #f5d08a;
      text-shadow: 0 0 12px rgba(245,180,60,0.4);
      white-space: nowrap;
    }
    header p {
      font-size: 11px;
      color: #907040;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }

    /* タイトルと同じ行の右側。controls-primary＝参拝済み/表示切替/達成状況（最優先で常に見える）
       controls-tags＝神宮・大社・一宮・名社1・その他のタグ▾（分類タグ本体）
       「その他のタグ」の開閉とは完全に独立しており、開閉してもこの並びは一切動かない */
    .controls-primary, .controls-tags {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .controls-primary { margin-left: auto; }
    /* 収納タグ（その他のタグ）：常に単独の行（幅100%で強制改行）。
       上の行には触れずに独立して現れる／消える */
    .more-filters {
      width: 100%;
    }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 20px;
      border: 1.5px solid;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      opacity: 0.42;
    }
    .filter-btn.active { opacity: 1; }

    .filter-btn.jingu   { background:rgba(212,134,10,0.12); border-color:#d4860a; color:#f5c842; }
    .filter-btn.jingu.active   { background:rgba(212,134,10,0.38); box-shadow:0 0 9px rgba(212,134,10,0.4); }
    .filter-btn.taisha  { background:rgba(124,58,237,0.12); border-color:#7c3aed; color:#c4a8ff; }
    .filter-btn.taisha.active  { background:rgba(124,58,237,0.32); box-shadow:0 0 9px rgba(124,58,237,0.4); }
    .filter-btn.ichi    { background:rgba(232,48,32,0.12); border-color:#e83020; color:#ff9a8a; }
    .filter-btn.ichi.active    { background:rgba(232,48,32,0.36); box-shadow:0 0 9px rgba(232,48,32,0.4); }
    .filter-btn.ni      { background:rgba(26,80,216,0.12); border-color:#1a50d8; color:#88b4ff; }
    .filter-btn.ni.active      { background:rgba(26,80,216,0.32); box-shadow:0 0 9px rgba(26,80,216,0.4); }
    .filter-btn.meisha  { background:rgba(5,150,105,0.12); border-color:#059669; color:#6ee7b7; }
    .filter-btn.meisha.active  { background:rgba(5,150,105,0.32); box-shadow:0 0 9px rgba(5,150,105,0.4); }
    .filter-btn.meisha2 { background:rgba(2,132,199,0.12); border-color:#0284c7; color:#7dd3fc; }
    .filter-btn.meisha2.active { background:rgba(2,132,199,0.32); box-shadow:0 0 9px rgba(2,132,199,0.4); }
    .filter-btn.meisha3 { background:rgba(180,83,9,0.12);  border-color:#b45309; color:#fcd34d; }
    .filter-btn.meisha3.active { background:rgba(180,83,9,0.32);  box-shadow:0 0 9px rgba(180,83,9,0.4); }
    .filter-btn.kinun  { background:rgba(184,134,11,0.12); border-color:#b8860b; color:#ffd700; }
    .filter-btn.kinun.active  { background:rgba(184,134,11,0.38); box-shadow:0 0 9px rgba(184,134,11,0.4); }
    .filter-btn.kaiun  { background:rgba(220,80,20,0.12);  border-color:#c03808; color:#ff7a3e; }
    .filter-btn.kaiun.active  { background:rgba(220,80,20,0.38);  box-shadow:0 0 9px rgba(220,80,20,0.4); }
    .filter-btn.hachiman { background:rgba(190,24,93,0.12); border-color:#be185d; color:#f9a8d4; }
    .filter-btn.hachiman.active { background:rgba(190,24,93,0.36); box-shadow:0 0 9px rgba(190,24,93,0.4); }
    .filter-btn.inari  { background:rgba(13,148,136,0.12); border-color:#0d9488; color:#5eead4; }
    .filter-btn.inari.active  { background:rgba(13,148,136,0.36); box-shadow:0 0 9px rgba(13,148,136,0.4); }
    .filter-btn.sanpai { background:rgba(245,208,138,0.10); border-color:#c8a860; color:#f5d08a; }
    .filter-btn.sanpai.active { background:rgba(245,208,138,0.30); box-shadow:0 0 9px rgba(245,208,138,0.4); }

    /* 全表示 / 全非表示 ボタン */
    .ctrl-divider {
      width: 1px; height: 22px;
      background: #3a2010;
      margin: 0 4px;
      flex-shrink: 0;
    }
    .filter-btn.all-toggle {
      background: rgba(245,208,138,0.08);
      border-color: #7a6030; color: #c8a860;
      opacity: 1;
    }
    .filter-btn.all-toggle:hover { background: rgba(245,208,138,0.18); color: #f5d08a; border-color: #b08040; }

    .filter-btn.achieve {
      background: rgba(232,48,32,0.08);
      border-color: #8a4030; color: #d49070;
      opacity: 1;
    }
    .filter-btn.achieve:hover { background: rgba(232,48,32,0.18); color: #ff9a8a; border-color: #c05838; }

    /* ── 巡り達成チェック モーダル ── */
    .achieve-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(10,5,2,0.72);
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .achieve-overlay.open { display: flex; }
    .achieve-modal {
      background: linear-gradient(180deg, #1c1108 0%, #120a05 100%);
      border: 1px solid #4a2a10;
      border-radius: 10px;
      width: min(720px, 100%);
      max-height: 86vh;
      display: flex; flex-direction: column;
      box-shadow: 0 12px 48px rgba(0,0,0,0.6);
    }
    .achieve-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #3a2010;
      flex-shrink: 0;
    }
    .achieve-title { font-size: 16px; color: #f5d08a; letter-spacing: 0.06em; }
    .achieve-close {
      cursor: pointer; color: #907050; font-size: 20px; line-height: 1;
      padding: 4px 8px; border-radius: 4px;
    }
    .achieve-close:hover { color: #f5d08a; background: rgba(245,208,138,0.1); }

    .achieve-tabs {
      display: flex; gap: 6px; padding: 12px 20px 0; flex-shrink: 0;
    }
    .achieve-tab {
      padding: 6px 16px; border-radius: 16px; border: 1.5px solid #4a2a10;
      background: transparent; color: #907050; font-family: inherit;
      font-size: 12px; letter-spacing: 0.05em; cursor: pointer; transition: all 0.15s;
    }
    .achieve-tab:hover { border-color: #6a4028; color: #d4b880; }
    .achieve-tab.active { background: rgba(245,208,138,0.16); border-color: #f5d08a; color: #f5d08a; }

    .achieve-summary {
      padding: 16px 20px; border-bottom: 1px solid #3a2010; flex-shrink: 0;
    }
    .achieve-summary-num { font-size: 30px; color: #f5d08a; font-weight: bold; }
    .achieve-summary-label { font-size: 12px; color: #907050; margin-top: 2px; }
    .achieve-bar-track {
      margin-top: 10px; height: 8px; border-radius: 4px;
      background: rgba(255,255,255,0.06); overflow: hidden;
    }
    .achieve-bar-fill {
      height: 100%; background: linear-gradient(90deg, #c47a08, #f5c842);
      border-radius: 4px; transition: width 0.4s ease;
    }

    .achieve-body { overflow-y: auto; padding: 8px 20px 20px; }
    .achieve-region { margin-top: 16px; }
    .achieve-region:first-child { margin-top: 4px; }
    .achieve-region-title {
      font-size: 11px; letter-spacing: 0.1em; color: #907050;
      border-bottom: 1px solid #3a2010; padding-bottom: 5px; margin-bottom: 8px;
    }
    .achieve-prov-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; }
    .achieve-prov {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 8px; border-radius: 6px;
      background: rgba(255,255,255,0.02);
    }
    .achieve-prov.done { background: rgba(212,134,10,0.1); }
    .achieve-prov-icon {
      width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; border: 1.5px solid #5a3a1a; color: transparent;
    }
    .achieve-prov.done .achieve-prov-icon {
      background: rgba(245,208,138,0.25); border-color: #f5d08a; color: #f5d08a;
    }
    .achieve-prov-name { font-size: 12px; color: #ddd0a0; }
    .achieve-prov.done .achieve-prov-name { color: #f5d08a; }
    .achieve-prov-count { font-size: 10px; color: #705030; margin-left: auto; }

    @media (max-width: 640px) {
      .achieve-prov-grid { grid-template-columns: 1fr; }
    }

    .filter-btn.more-toggle {
      background: rgba(245,208,138,0.06);
      border-color: #5a4020; color: #907050;
      opacity: 1;
    }
    .filter-btn.more-toggle:hover { background: rgba(245,208,138,0.14); color: #d4b880; border-color: #8a6838; }
    .filter-btn.more-toggle.expanded { color: #f5d08a; border-color: #b08040; }
    .more-filters {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-height: 0; opacity: 0; overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.2s ease;
    }
    .more-filters.expanded { max-height: 120px; opacity: 1; }

    .dot { width: 9px; height: 9px; border-radius: 50%; }
    .dot.gold    { background:#f5c842; box-shadow:0 0 5px #f5c842; }
    .dot.purple  { background:#a070f8; box-shadow:0 0 5px #a070f8; }
    .dot.red     { background:#e83020; box-shadow:0 0 5px #e83020; }
    .dot.blue    { background:#2060e8; box-shadow:0 0 5px #2060e8; }
    .dot.green   { background:#34d399; box-shadow:0 0 5px #34d399; }
    .dot.cyan    { background:#38bdf8; box-shadow:0 0 5px #38bdf8; }
    .dot.orange  { background:#fb923c; box-shadow:0 0 5px #fb923c; }

    .stats { font-size: 12px; color: #705030; border-left: 1px solid #4a2a10; padding-left: 10px; white-space: nowrap; }

    /* ── マップエリア（地図＋サイドバー） ── */
    #map-area {
      flex: 1;
      display: flex;
      position: relative;
      overflow: hidden;
    }
    #map { flex: 1; min-width: 0; z-index: 1; }
    /* タイルのみに適用（マーカー・ポップアップには影響しない）
       OSM 白地図を暗色に反転しつつ、コントラストを穏やかに保つ */
    .leaflet-tile-pane {
      filter: invert(0.91) hue-rotate(180deg) contrast(0.80) brightness(0.88) saturate(0.60);
    }

    /* ── サイドバー ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #160b04 0%, #0d0813 100%);
      border-left: 1px solid #3a1e08;
      display: flex;
      flex-direction: column;
      z-index: 500;
      transition: width 0.25s ease, opacity 0.25s ease;
    }
    #sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }

    .sidebar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-bottom: 1px solid #3a1e08;
      background: rgba(44,24,16,0.6);
      flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: #b08040;
    }
    .sidebar-count {
      font-size: 11px;
      color: #5a3a1a;
    }
    .sidebar-toggle-btn {
      background: none;
      border: 1px solid #4a2a10;
      color: #907040;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      transition: all 0.15s;
      font-family: inherit;
    }
    .sidebar-toggle-btn:hover { background: rgba(255,200,80,0.1); color: #f5d08a; }

    #sidebar-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3a1e08 transparent;
    }
    #sidebar-list::-webkit-scrollbar { width: 4px; }
    #sidebar-list::-webkit-scrollbar-track { background: transparent; }
    #sidebar-list::-webkit-scrollbar-thumb { background: #3a1e08; border-radius: 4px; }

    .sidebar-section-title {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 5px 12px 5px 10px;
      font-size: 10px;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-section-count {
      font-size: 10px;
      opacity: 0.6;
    }

    .shrine-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid rgba(58,30,8,0.4);
      transition: background 0.12s;
    }
    .shrine-item:hover    { background: rgba(245,208,138,0.07); }
    .shrine-item.selected { background: rgba(245,208,138,0.16); }

    .shrine-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .shrine-item-name {
      font-size: 12px;
      color: #ddd0a0;
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .shrine-item.selected .shrine-item-name { color: #f5d08a; }
    .shrine-item-main { flex:1; min-width:0; display:flex; flex-direction:column; gap:2px; }
    .shrine-item-pref {
      font-size: 10px;
      color: #5a3a1a;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .shrine-item.visited .shrine-item-name { color: #f5d08a; }

    /* 参拝済みチェック */
    .visit-check {
      flex-shrink: 0;
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 1.5px solid #6a5030;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 10px;
      color: transparent;
      transition: all 0.15s;
    }
    .visit-check:hover { border-color: #c8a860; }
    .visit-check.checked {
      background: rgba(245,208,138,0.28);
      border-color: #f5d08a;
      color: #f5d08a;
    }
    .visit-date {
      flex-shrink: 0;
      font-size: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid #4a2a10;
      color: #d4b880;
      border-radius: 4px;
      padding: 2px 3px;
      font-family: inherit;
      width: 92px;
      color-scheme: dark;
    }

    /* サイドバー開閉ボタン（地図上に浮かせる） */
    #sidebar-open-btn {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      z-index: 600;
      background: rgba(30,14,6,0.88);
      border: 1px solid #4a2a10;
      border-right: none;
      color: #f5d08a;
      border-radius: 6px 0 0 6px;
      padding: 10px 5px;
      cursor: pointer;
      font-size: 12px;
      writing-mode: vertical-rl;
      letter-spacing: 0.1em;
      transition: all 0.15s;
      display: none;
      font-family: inherit;
    }
    #sidebar-open-btn:hover { background: rgba(60,30,10,0.95); color:#fff; }
    #sidebar-open-btn.visible { display: block; }

    /* Popup */
    .shrine-popup .leaflet-popup-content-wrapper {
      background: linear-gradient(135deg, #1e0e06 0%, #0f0a1a 100%);
      border: 1px solid #6b3a1f; border-radius: 8px; color: #f0e6c8;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 0 15px rgba(200,80,20,0.12);
    }
    .shrine-popup .leaflet-popup-tip { background: #6b3a1f; }
    .shrine-popup .leaflet-popup-close-button { color: #907040 !important; }

    .popup-content { min-width: 190px; }

    .popup-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .popup-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:11px; letter-spacing:0.06em; border:1px solid; }
    .popup-badge.jingu   { background:rgba(212,134,10,0.22); border-color:#d4860a; color:#f5c842; }
    .popup-badge.taisha  { background:rgba(124,58,237,0.22); border-color:#7c3aed; color:#c4a8ff; }
    .popup-badge.ichi    { background:rgba(232,48,32,0.22);  border-color:#e83020; color:#ff9a8a; }
    .popup-badge.ni      { background:rgba(26,80,216,0.22);  border-color:#1a50d8; color:#88b4ff; }
    .popup-badge.meisha  { background:rgba(5,150,105,0.22);  border-color:#059669; color:#6ee7b7; }
    .popup-badge.meisha2 { background:rgba(2,132,199,0.22);  border-color:#0284c7; color:#7dd3fc; }
    .popup-badge.meisha3 { background:rgba(180,83,9,0.22);   border-color:#b45309; color:#fcd34d; }
    .popup-badge.hachiman{ background:rgba(190,24,93,0.22);  border-color:#be185d; color:#f9a8d4; }
    .popup-badge.inari   { background:rgba(13,148,136,0.22); border-color:#0d9488; color:#5eead4; }
    .popup-badge.sanpai  { background:rgba(245,208,138,0.22);border-color:#c8a860; color:#f5d08a; }

    .popup-name    { font-family: 'Hiragino Mincho ProN', 'Yu Mincho', 'Noto Serif JP', serif; font-size:16px; font-weight:bold; color:#f5d08a; letter-spacing:0.05em; margin-bottom:3px; text-shadow:0 0 8px rgba(245,180,60,0.3); }
    .popup-pref    { font-size:11px; color:#907040; margin-bottom:7px; }
    .popup-province{ font-size:11px; color:#b08858; padding:3px 8px; background:rgba(255,255,255,0.05); border-radius:4px; margin-bottom:5px; }
    .popup-reason  { font-size:11px; color:#708870; padding:3px 8px; background:rgba(0,255,128,0.04); border-radius:4px; margin-bottom:5px; }
    .popup-deity   { font-size:11px; color:#906848; line-height:1.6; margin-bottom:8px; }

    .popup-visit { margin-bottom:9px; display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
    .popup-visit-btn {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 10px; border-radius:14px; border:1.5px solid #6a5030;
      color:#c8a860; font-size:11px; letter-spacing:0.04em;
      cursor:pointer; transition:all 0.15s; user-select:none;
    }
    .popup-visit-btn:hover { border-color:#c8a860; }
    .popup-visit-btn.checked {
      background:rgba(245,208,138,0.22); border-color:#f5d08a; color:#f5d08a;
    }
    .popup-visit-date {
      font-size:10px; background:rgba(0,0,0,0.3); border:1px solid #4a2a10;
      color:#d4b880; border-radius:4px; padding:2px 4px; font-family:inherit;
      color-scheme: dark;
    }

    .popup-gmaps {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin-top: 6px;
      padding: 5px 10px;
      border-radius: 6px;
      background: rgba(66,133,244,0.14);
      border: 1px solid rgba(66,133,244,0.35);
      color: #7eb8ff;
      font-size: 11px;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: background 0.15s, color 0.15s;
    }
    .popup-gmaps:hover {
      background: rgba(66,133,244,0.28);
      color: #aad4ff;
    }
    .popup-gmaps-icon { font-size: 13px; }

    /* Legend */
    .legend {
      position:absolute; bottom:24px; left:16px; z-index:1000;
      background:linear-gradient(135deg,rgba(30,14,6,0.93) 0%,rgba(15,10,26,0.93) 100%);
      border:1px solid #4a2a10; border-radius:8px; padding:10px 14px;
      backdrop-filter:blur(4px); box-shadow:0 4px 16px rgba(0,0,0,0.5);
    }

  { pref:"長野", name:"諏訪大社前宮",       tags:["meisha"],  province:"信濃国", lat:35.99114, lng:138.13339, deity:"建御名方神",                          reason:"諏訪大社四社のひとつ。大祝（おおほうり）が座した諏訪大社発祥の最古の社地とされる。" },

  { pref:"東京", name:"東京大神宮",       tags:["meisha2"], province:"武蔵国", lat:35.69998, lng:139.74687, deity:"天照皇大神・豊受大神・造化三神・倭大国魂神", reason:"東京のお伊勢さま。日本初の神前結婚式を行った縁結びの聖地。明治時代に伊勢両宮を遥拝する神社として創建。" },

  { pref:"埼玉", name:"久伊豆神社",       tags:["meisha3"], province:"武蔵国", lat:35.92744, lng:139.77472, deity:"大己貴命",                                 reason:"武蔵国式内社。越谷市に鎮座する旧郷社。孔雀の放し飼いで有名。埼玉東部に多い久伊豆神社の代表格。" },

  { pref:"山梨", name:"山梨岡神社",       tags:["meisha3"], province:"甲斐国", lat:35.66461, lng:138.63875, deity:"山梨岡大神（大山祇命）",                   reason:"延喜式内名神大社。笛吹市春日居町に鎮座。甲斐国最古の神社のひとつとされ、甲斐国内随一の古格を持つ名神大社。" },

  { pref:"埼玉",   name:"聖神社",                  tags:["kinun"], province:"武蔵国", lat:36.05008, lng:139.10258, deity:"天照大御神・豊受大御神ほか",            reason:"日本最古の鋳銭地・和銅採掘遺跡に隣接。和同開珎（708年）発祥の地として金運の聖地。秩父市黒谷に所在し、日本の貨幣文化の起源を伝える。" },
  { pref:"東京",   name:"穴守稲荷神社",            tags:["kinun","inari"], province:"武蔵国", lat:35.55039, lng:139.74964, deity:"豊受姫命（宇加之御魂神）",              reason:"羽田の守り神。大田区羽田に鎮座。江戸時代より海上安全・商売繁盛の稲荷として信仰。金運・開運のパワースポットとして現代でも参拝者が絶えない。" },
  { pref:"東京",   name:"田無神社",                tags:["kinun"], province:"武蔵国", lat:35.72990, lng:139.54405, deity:"級長津彦命・級長戸辺命ほか",            reason:"五龍神を祀る都内屈指の金運神社。西東京市に鎮座。金龍（金運）・白龍（出世）・青龍（仕事）・黒龍・赤龍の五色の龍神が金運・開運をもたらすとして人気急上昇。" },
  { pref:"東京",   name:"水天宮",                  tags:["kinun"], province:"武蔵国", lat:35.68360, lng:139.78500, deity:"天御中主神・安徳天皇・高倉平中宮ほか",  reason:"中央区日本橋に鎮座する財運・安産の神。江戸時代より金融・商業の中心地日本橋の守護神として信仰。毎月5日の縁日は賑わいを見せる。" },
  { pref:"栃木",   name:"大前神社",                tags:["kinun"], province:"下野国", lat:36.44939, lng:140.02600, deity:"大己貴命・事代主命",                    reason:"日本最大の恵比寿像で著名。真岡市に鎮座。商売繁盛・金運の神様「えびすさま」を祀る関東随一の商売繁盛の聖地とされ、全国から参拝者が訪れる。" },
  { pref:"東京",   name:"福徳神社",                tags:["kinun"], province:"武蔵国", lat:35.68731, lng:139.77444, deity:"倉稲魂命・天穂日命ほか",                reason:"富くじ発祥の神社。中央区日本橋室町に鎮座。江戸時代に幕府公認の富くじ（宝くじ）が行われた地。商売繁盛・金運・開運の神として信仰が厚い。" },
  { pref:"東京",   name:"鷲神社",                  tags:["kinun"], province:"武蔵国", lat:35.72257, lng:139.79189, deity:"天日鷲命・日本武尊",                    reason:"酉の市の発祥地。台東区千束に鎮座。熊手（開運かきこめ）で商売繁盛・金運アップを祈る酉の市は江戸三大祭りのひとつ。商人の聖地として全国的に有名。" },
  { pref:"東京",   name:"烏森神社",                tags:["kinun"], province:"武蔵国", lat:35.66678, lng:139.75679, deity:"倉稲魂神・天鈿女命・瓊々杵尊",          reason:"港区新橋に鎮座。心願成就・金運・開運で知られるサラリーマンの聖地。カラフルな御朱印が話題を呼び、若い世代からも人気の金運パワースポット。" },
  { pref:"岐阜",   name:"金神社",                  tags:["kinun"], province:"美濃国", lat:35.41680, lng:136.75700, deity:"金大神（渟熨斗姫命・市隼雄命）",        reason:"岐阜市に鎮座する金運専門の神社。御祭神「金大神」の名が示す通り財運・金運の神として全国的に有名。金色に輝く社殿が印象的で年間多数の参拝者が訪れる。" },
  { pref:"京都",   name:"御金神社",                tags:["kinun"], province:"山城国", lat:35.01183, lng:135.75497, deity:"金山毘古神",                            reason:"京都市中京区に鎮座する金運専門神社。黄金色の鳥居が印象的。宝くじ・株・不動産など財運全般に霊験あらたかとされ、金運を求めて全国から参拝者が集まる。" },
  { pref:"宮城",   name:"金蛇水神社",              tags:["kinun"], province:"陸奥国", lat:38.11969, lng:140.83794, deity:"金蛇大神",                              reason:"岩沼市に鎮座。蛇神＝金運の象徴として財運・商売繁盛に霊験あらたか。4月の金蛇大祭・牡丹祭は東北有数の名物行事。金運スポットとして全国から参拝者が訪れる。" },
  { pref:"宮城",   name:"黄金山神社",              tags:["kinun"], province:"陸奥国", lat:38.55983, lng:141.13915, deity:"金山毘古神・金山毘売神",                 reason:"涌谷町に鎮座。日本で最初に砂金が産出された地（749年）に建立された金運の神社。聖武天皇に砂金を献上した歴史が金運の由来となっている最古の金運聖地。" },
  { pref:"佐賀",   name:"宝当神社",                tags:["kinun"], province:"肥前国", lat:33.47389, lng:129.98806, deity:"野崎隠岐守綱吉（野崎大明神）",           reason:"唐津市高島に鎮座。宝くじ当選祈願の神社として全国的に有名。「宝当」の名の通り財運が授かるとされ、抽選日前には島への連絡船が満員になる全国屈指の金運社。" },
  { pref:"大阪",   name:"今宮戎神社",              tags:["kinun"], province:"摂津国", lat:34.65533, lng:135.50247, deity:"事代主命（えびす神）",                   reason:"商売繁盛の象徴「十日戎」の総本社的存在。大阪市浪速区に鎮座。毎年1月9〜11日の十日戎には100万人以上が参拝し、商人の町大阪の金運・商売繁盛の守護神として君臨。" },
  { pref:"兵庫",   name:"西宮神社",                tags:["kinun"], province:"摂津国", lat:34.73573, lng:135.33458, deity:"蛭児大神（えびす神）",                   reason:"全国3,500社えびす神社の総本社。西宮市に鎮座。毎年1月10日の「十日えびす」で行われる福男選びは全国に中継される。商売繁盛・金運の神として日本随一の知名度を誇る。" },
  { pref:"島根",   name:"美保神社",                tags:["kinun"], province:"出雲国", lat:35.56231, lng:133.30605, deity:"三穂津姫命・事代主神",                   reason:"えびす神（事代主神）の総本社。松江市美保関に鎮座。商売繁盛・漁業・金運の神。出雲大社（大国主命）とともに「えびす・大黒」両参りが有名。旧国幣中社。" },
  { pref:"神奈川", name:"叶神社（東叶神社）",      tags:["kinun"], province:"相模国", lat:35.24194, lng:139.71806, deity:"誉田別命（応神天皇）",                   reason:"横須賀市東浦賀に鎮座。「願いが叶う」神社で対岸の西叶神社と合わせて参拝するのが習わし。金運・開運・勝運で信仰を集め、浦賀水道を望む景勝地にある古社。" },
  { pref:"群馬",   name:"冠稲荷神社",              tags:["kinun","inari"], province:"上野国", lat:36.26881, lng:139.35153, deity:"保食神・宇迦御魂神ほか",                 reason:"太田市に鎮座。関東屈指の金運稲荷神社として商売繁盛・金運上昇のご利益で有名。「冠」の名は源義家が兜に稲荷神を勧請した故事に由来。縁日・狐の嫁入り行列でも著名。" },

  // ===== 開運 =====
  { pref:"栃木",   name:"太平山神社",              tags:["kaiun"], province:"下野国", lat:36.36278, lng:139.69278, deity:"神日本磐余彦尊・天照皇大御神・豊城入彦命", reason:"関東三大縁起（初山詣）のひとつ。栃木市太平山に鎮座。開運・縁起の神として古来より信仰。頂上からの眺望は絶景で、桜・あじさい・紅葉の名所としても名高い山岳社。" },
  { pref:"埼玉",   name:"箭弓稲荷神社",            tags:["kaiun","inari"], province:"武蔵国", lat:36.03444, lng:139.39861, deity:"倉稲魂命",                              reason:"東松山市に鎮座。開運・出世の稲荷神社として関東随一の格式を誇る。源義家が戦勝祈願した故事から「矢を弓につがえた如く願いが叶う」の信仰が千年続く霊社。" },
  { pref:"東京",   name:"花園神社",                tags:["kaiun"], province:"武蔵国", lat:35.69355, lng:139.70518, deity:"倉稲魂命・日本武尊・稲荷大神",            reason:"新宿の総鎮守。新宿区に鎮座。商業・芸能・開運のご利益で有名。毎年11月の酉の市は新宿の風物詩として多くの熊手商が並ぶ。歌舞伎町に隣接する繁華街の守護神。" },
  { pref:"東京",   name:"谷保天満宮",              tags:["kaiun"], province:"武蔵国", lat:35.68045, lng:139.44444, deity:"菅原道真・菅原道武",                       reason:"関東三大天神のひとつ（湯島・亀戸と並ぶ）。国立市に鎮座。開運・合格・縁結びの神。梅の名所としても有名で、道真公ゆかりの梅が満開を迎えると多くの参拝者が訪れる。" },
  { pref:"東京",   name:"牛嶋神社",                tags:["kaiun"], province:"武蔵国", lat:35.71292, lng:139.80472, deity:"須佐之男命・天之穂日命・貞辰親王命",       reason:"全国の撫牛信仰の発祥地。墨田区向島に鎮座。撫牛（なでうし）を撫でると病気平癒・厄除け開運のご利益があるとされ、隅田川流域の人々に親しまれる古社。" },
  { pref:"東京",   name:"赤坂氷川神社",            tags:["kaiun"], province:"武蔵国", lat:35.66821, lng:139.73556, deity:"素戔嗚尊・奇稲田姫命・大己貴命",           reason:"港区赤坂に鎮座する縁結び・厄除けのパワースポット。東京十社のひとつ。8代将軍吉宗が再建した都内屈指の格式ある社殿。縁結び・開運の霊験で現代でも人気が高い。" },
  { pref:"神奈川", name:"走水神社",                tags:["kaiun"], province:"相模国", lat:35.26144, lng:139.73092, deity:"日本武尊・弟橘媛命",                       reason:"横須賀市走水に鎮座。日本武尊の東征ゆかりの地。浦賀水道を望む海岸に建つ勝運・開運・航海安全の神。清々しいロケーションのパワースポットとして信仰が深い。" },
  { pref:"群馬",   name:"妙義神社",                tags:["kaiun"], province:"上野国", lat:36.30047, lng:138.76239, deity:"日本武尊・豊受大神・菅原道真ほか",          reason:"日本三大奇景・妙義山に鎮座する開運の名社。富岡市に所在。奇岩絶壁を御神体とし強力なパワースポットとして知られる。旧県社。関東地方屈指の山岳信仰の霊地。" },
  { pref:"山梨",   name:"小御嶽神社",              tags:["kaiun"], province:"甲斐国", lat:35.39436, lng:138.73348, deity:"磐長姫命・石動彦命",                       reason:"富士山五合目（吉田口）に鎮座。標高2,305mの境内は富士登山の出発点。富士山信仰と一体となった開運の神社で、縁結び・長寿・運気上昇を祈る参拝者が訪れる。" },
  { pref:"静岡",   name:"白浜神社",                tags:["kaiun"], province:"伊豆国", lat:34.69405, lng:138.97361, deity:"伊古奈比咩命・三嶋溝咋耳神",               reason:"伊豆最古の神社。下田市白浜の海岸に鎮座。旧国幣中社。縁結び・開運・航海安全の神として古来より信仰が深く、白砂青松の境内は「縁起の良い」パワースポット。" },
  { pref:"茨城",   name:"大洗磯前神社",            tags:["kaiun"], province:"常陸国", lat:36.31591, lng:140.58722, deity:"大己貴命・少彦名命",                       reason:"大洗町の海岸に鎮座。大化の改新後に「よみがえった国造りの神」として復活した開運の神。海中の岩礁に立つ「神磯の鳥居」が絶景で、朝日との景観は全国的に有名。" },
  { pref:"宮崎",   name:"天岩戸神社",              tags:["kaiun"], province:"日向国", lat:32.73444, lng:131.35056, deity:"天照大御神",                               reason:"「岩戸開き」発祥の地。高千穂町岩戸に鎮座。天照大御神が身を隠した天岩戸を御神体とする。御神体の洞窟を直接拝める遥拝所は日本の開運信仰の原点とも言える聖地。" },
  { pref:"京都",   name:"元伊勢皇大神社",          tags:["kaiun"], province:"丹後国", lat:35.43014, lng:135.15450, deity:"天照大御神",                               reason:"伊勢神宮の天照大御神が伊勢へ遷座する前に祀られた「元伊勢」の内宮。福知山市大江町に鎮座。万願成就・開運・縁結びのご利益で知られる山深い霊地。旧村社。" },
  { pref:"鳥取",   name:"白兎神社",                tags:["kaiun"], province:"因幡国", lat:35.52417, lng:134.11556, deity:"白兎神",                                   reason:"因幡の白兎伝説ゆかりの神社。鳥取市白浜海岸に鎮座。大国主命と縁を結んだ白兎神が御祭神。縁結び・開運・皮膚病平癒のご利益で有名。日本神話最古の縁起話の舞台。" },
  { pref:"宮崎",   name:"生目神社",                tags:["kaiun"], province:"日向国", lat:31.91828, lng:131.37678, deity:"応神天皇・仁徳天皇・武内宿禰",              reason:"宮崎市に鎮座。目の神様として全国から参拝者が訪れる。開運・商売繁盛・勝運でも名高く、南九州最大の社叢を誇る。地元では「生目さん」として古来より親しまれる古社。" },
  { pref:"山形",   name:"出羽三山神社",            tags:["kaiun"], province:"出羽国", lat:38.70255, lng:139.98135, deity:"倉稲魂命・月山神・大山祇命ほか",            reason:"月山・羽黒山・湯殿山の三山を総称。鶴岡市羽黒町に鎮座。1,400年以上の歴史を誇る東北最大の修験道の聖地。「死と再生・生まれ変わり」の祈りで知られる開運の霊地。" },
  { pref:"和歌山", name:"飛瀧神社",                tags:["kaiun"], province:"紀伊国", lat:33.67428, lng:135.88744, deity:"大己貴命（那智大滝を御神体）",              reason:"落差133mの那智大滝そのものを御神体とする神社。熊野那智大社の別宮。東牟婁郡那智勝浦町に鎮座。世界遺産の滝のそばで開運・運気上昇を祈る聖地として名高い。" },
  { pref:"島根",   name:"八重垣神社",              tags:["kaiun"], province:"出雲国", lat:35.42903, lng:133.07369, deity:"素戔嗚尊・稲田姫命・大国主命ほか",          reason:"松江市に鎮座する縁結び・開運の名社。境内の「鏡の池」に紙を浮かべて縁を占う習わしが有名。素戔嗚尊が稲田姫を守った故事ゆかりのパワースポット。" },
  { pref:"福岡",   name:"宮地嶽神社",              tags:["kaiun"], province:"筑前国", lat:33.77972, lng:130.48611, deity:"神功皇后・勝村大神・勝頼大神",              reason:"福津市に鎮座。「何事も必ず成し遂げられる」開運神社として全国的に有名。年2回、参道に夕日が沈む「光の道」の絶景が話題。日本一の大鈴・大太鼓・大鳥居を誇る。" },
  { pref:"佐賀",   name:"武雄神社",                tags:["kaiun"], province:"肥前国", lat:33.18817, lng:130.02094, deity:"武雄大神（五十猛命）",                      reason:"武雄市に鎮座。樹齢3,000年以上の大楠（国指定天然記念物）が御神木のパワースポット。縁結び・長寿・開運のご利益で知られ、武雄温泉に隣接する九州有数の霊気漂う古社。" },

// ===== アイコン =====
const iconCache = {};
function getIcon(tag, visited) {
  const key = tag + (visited ? '_v' : '');
  if (iconCache[key]) return iconCache[key];
  const c = TAG_CONFIG[tag];
  const badge = visited ? `
    <circle cx="27" cy="9" r="7" fill="#1a1209" stroke="#f5d08a" stroke-width="1.5"/>
    <text x="27" y="12.5" text-anchor="middle" font-size="9" font-weight="bold" fill="#f5d08a">✓</text>` : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="34" height="42" viewBox="0 0 34 42">
    <defs><filter id="g${key}"><feGaussianBlur stdDeviation="1.8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    <path d="M17 2C9 2 2 9 2 17c0 10 15 23 15 23S32 27 32 17C32 9 25 2 17 2z"
          fill="${c.color}" fill-opacity="0.9" stroke="${c.border}" stroke-width="1.5"
          filter="url(#g${key})"/>
    <circle cx="17" cy="17" r="9" fill="rgba(255,255,255,0.13)"/>
    <text x="17" y="22" text-anchor="middle"
          font-family="'Hiragino Mincho ProN','Yu Mincho',serif"
          font-size="12" font-weight="bold" fill="white">${c.char}</text>
    ${badge}
  </svg>`;
  iconCache[key] = L.divIcon({ html:svg, className:'', iconSize:[34,42], iconAnchor:[17,40], popupAnchor:[0,-42] });
  return iconCache[key];
}

// ===== 参拝済み記録（localStorage） =====
const VISIT_KEY = 'shrineMapVisits_v1';
function loadVisits() {
  try { return JSON.parse(localStorage.getItem(VISIT_KEY)) || {}; } catch(e) { return {}; }
}
const visits = loadVisits();
function saveVisits() {
  try { localStorage.setItem(VISIT_KEY, JSON.stringify(visits)); } catch(e) {}
}
function visitKey(s) { return s.pref + '|' + s.name; }
function isVisited(s) { return !!visits[visitKey(s)]; }
function getVisitDate(s) { const v = visits[visitKey(s)]; return (v && v.date) ? v.date : ''; }

function toggleVisited(idx) {
  const { shrine, marker } = markerList[idx];
  const key = visitKey(shrine);
  if (visits[key]) delete visits[key];
  else visits[key] = { date: '' };
  saveVisits();
  marker.setIcon(getIcon(topTag(shrine.tags), isVisited(shrine)));
  if (marker.isPopupOpen()) {
    marker.getPopup().setContent(buildPopupContent(shrine, idx));
    bindPopupVisitEvents(marker, idx);
  }
  redrawMarkers();
}
function setVisitDate(idx, dateStr) {
  const { shrine } = markerList[idx];
  const key = visitKey(shrine);
  if (!visits[key]) visits[key] = {};
  visits[key].date = dateStr;
  saveVisits();
}

// ===== フィルター状態（localStorage・前回選択を復元／初回は神宮・一宮のみ） =====
const FILTER_KEY = 'shrineMapFilters_v1';
function readSavedFilters() {
  try {
    const arr = JSON.parse(localStorage.getItem(FILTER_KEY));
    return Array.isArray(arr) ? arr : null;
  } catch(e) { return null; }
}
function persistFilters() {
  try { localStorage.setItem(FILTER_KEY, JSON.stringify([...activeFilters])); } catch(e) {}
}

// ===== マーカー描画 =====
const _savedFilters = readSavedFilters();
const activeFilters = new Set(_savedFilters || ['jingu', 'ichi']);
const markerList = [];

// このシャインがどれかの表示条件を満たすか（分類タグ or 参拝済みフィルタ）
function passesFilter(shrine) {
  return shrine.tags.some(t => activeFilters.has(t)) || (activeFilters.has('sanpai') && isVisited(shrine));
}

// サイドバーでの振り分け先：有効フィルタの中で最優先のタグ（非表示タグに埋もれて
// リストから消えるのを防ぐため、topTag()とは別に「今表示中のタグ」だけで判定する）
function displayTag(shrine) {
  const activeTags = shrine.tags.filter(t => activeFilters.has(t));
  if (activeTags.length === 0) return null;
  return activeTags.reduce((b,t) => PRIORITY[t] > PRIORITY[b] ? t : b, activeTags[0]);
}

// 選択中のリストアイテムと演出レイヤー
let selectedListItem = null;
let flashLayer = null;

// ポップアップの中身を組み立てる（参拝済み状態が変わるたびに作り直す）
function buildPopupContent(s, idx) {
  const badges = s.tags.slice()
    .sort((a,b) => PRIORITY[b]-PRIORITY[a])
    .map(t => `<span class="popup-badge ${t}">${TAG_CONFIG[t].label}</span>`)
    .join('') + (isVisited(s) ? `<span class="popup-badge sanpai">参拝済み</span>` : '');
  const reasonHtml = s.reason
    ? `<div class="popup-reason">${s.reason}</div>`
    : '';
  const gmapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(s.name)}`;
  const visited = isVisited(s);
  const date = getVisitDate(s);

  return `
    <div class="popup-content">
      <div class="popup-badges">${badges}</div>
      <div class="popup-name">${s.name}</div>
      <div class="popup-pref">${s.pref}</div>
      <div class="popup-province">旧国：${s.province}</div>
      ${reasonHtml}
      <div class="popup-deity">祭神：${s.deity}</div>
      <div class="popup-visit">
        <div class="popup-visit-btn ${visited ? 'checked' : ''}" data-idx="${idx}">${visited ? '✓ 参拝済み' : '○ 参拝済みにする'}</div>
        ${visited ? `<input type="date" class="popup-visit-date" value="${date}">` : ''}
      </div>
      <a href="${gmapsUrl}" target="_blank" rel="noopener" class="popup-gmaps">
        <span class="popup-gmaps-icon">📍</span> Google マップで開く
      </a>
    </div>`;
}

// ポップアップ内の参拝済みボタン・日付欄にイベントを結びつける
// （setContentで中身を作り直すたびにDOMが差し替わるので毎回呼び直す）
function bindPopupVisitEvents(marker, idx) {
  const el = marker.getPopup() && marker.getPopup().getElement();
  if (!el) return;
  const btn = el.querySelector('.popup-visit-btn');
  if (btn) {
    btn.onclick = (e) => {
      e.stopPropagation();
      toggleVisited(idx);
      marker.getPopup().setContent(buildPopupContent(markerList[idx].shrine, idx));
      bindPopupVisitEvents(marker, idx);
    };
  }
  const dateInput = el.querySelector('.popup-visit-date');
  if (dateInput) {
    dateInput.onclick = (e) => e.stopPropagation();
    dateInput.onchange = (e) => setVisitDate(idx, e.target.value);
  }
}

shrines.forEach((s, idx) => {
  const primary = topTag(s.tags);
  const popup = L.popup({ className:'shrine-popup' }).setContent(buildPopupContent(s, idx));
  const marker = L.marker([s.lat, s.lng], { icon: getIcon(primary, isVisited(s)) }).bindPopup(popup);

  marker.on('popupopen', () => bindPopupVisitEvents(marker, idx));

  // マーカークリック → リスト側をハイライト＆スクロール
  marker.on('click', () => {
    const el = document.querySelector(`.shrine-item[data-idx="${idx}"]`);
    if (el) highlightListItem(el);
  });

  markerList.push({ marker, shrine:s, idx });
  if (passesFilter(s)) marker.addTo(map);
});

// ===== サイドバー：リスト描画 =====
const TAG_ORDER = ['jingu','taisha','ichi','ni','meisha','meisha2','hachiman','inari','meisha3','kinun','kaiun'];

// 1件分のリストアイテムDOMを組み立てる（参拝済みチェック＋任意の日付つき）
function buildShrineItem(shrine, sIdx, dotColor) {
  const visited = isVisited(shrine);
  const date = getVisitDate(shrine);
  const item = document.createElement('div');
  item.className = 'shrine-item' + (visited ? ' visited' : '');
  item.dataset.idx = sIdx;
  item.innerHTML = `
    <div class="visit-check ${visited ? 'checked' : ''}" title="参拝済みにする">✓</div>
    <div class="shrine-item-dot" style="background:${dotColor};box-shadow:0 0 5px ${dotColor}80;"></div>
    <div class="shrine-item-main">
      <div class="shrine-item-name">${shrine.name}</div>
      ${visited ? `<input type="date" class="visit-date" value="${date}">` : ''}
    </div>
    <div class="shrine-item-pref">${shrine.pref}</div>`;

  item.querySelector('.visit-check').addEventListener('click', (e) => {
    e.stopPropagation();
    toggleVisited(sIdx);
  });
  const dateInput = item.querySelector('.visit-date');
  if (dateInput) {
    dateInput.addEventListener('click', (e) => e.stopPropagation());
    dateInput.addEventListener('change', (e) => setVisitDate(sIdx, e.target.value));
  }
  item.addEventListener('click', () => focusShrine(sIdx, item));
  return item;
}

function renderList() {
  const list = document.getElementById('sidebar-list');
  list.innerHTML = '';
  let total = 0;

  // ── 参拝済みセクション（フィルタON時のみ・全ての参拝済み社をまとめて表示）──
  if (activeFilters.has('sanpai')) {
    const visitedItems = markerList.filter(({shrine}) => isVisited(shrine));
    if (visitedItems.length > 0) {
      const sec = document.createElement('div');
      sec.className = 'sidebar-section';
      const title = document.createElement('div');
      title.className = 'sidebar-section-title';
      title.style.cssText = `background:${SANPAI_CONFIG.bg}; border-left:3px solid ${SANPAI_CONFIG.border}; color:${SANPAI_CONFIG.border};`;
      title.innerHTML = `<span>${SANPAI_CONFIG.label}</span><span class="sidebar-section-count">${visitedItems.length}社</span>`;
      sec.appendChild(title);
      visitedItems.forEach(({shrine, idx: sIdx}) => sec.appendChild(buildShrineItem(shrine, sIdx, SANPAI_CONFIG.color)));
      list.appendChild(sec);
    }
  }

  TAG_ORDER.forEach(tag => {
    if (!activeFilters.has(tag)) return;

    // 「今表示中のタグの中での最優先」がこのタグのものだけ（重複防止）
    const items = markerList.filter(({shrine}) => displayTag(shrine) === tag);
    if (items.length === 0) return;

    const cfg = TAG_CONFIG[tag];

    // セクション見出し
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';

    const title = document.createElement('div');
    title.className = 'sidebar-section-title';
    title.style.cssText = `background:${cfg.bg}; border-left:3px solid ${cfg.border}; color:${cfg.border};`;
    title.innerHTML = `<span>${cfg.label}</span><span class="sidebar-section-count">${items.length}社</span>`;
    sec.appendChild(title);

    items.forEach(({shrine, idx: sIdx}) => sec.appendChild(buildShrineItem(shrine, sIdx, cfg.color)));

    list.appendChild(sec);
    total += items.length;
  });

  document.getElementById('sidebar-count').textContent = `${total}社`;
}

// ===== リスト選択ハイライト =====
function highlightListItem(el) {
  if (!el) return;
  if (selectedListItem) selectedListItem.classList.remove('selected');
  el.classList.add('selected');
  selectedListItem = el;
  el.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

// ===== リストクリック → 地図フォーカス =====
function focusShrine(idx, listItem) {
  highlightListItem(listItem);

  const { marker, shrine } = markerList[idx];

  // 発光サークル演出
  if (flashLayer) { map.removeLayer(flashLayer); flashLayer = null; }
  flashLayer = L.circle([shrine.lat, shrine.lng], {
    radius: 1200,
    color: '#f5d08a', weight: 2, opacity: 0.9,
    fillColor: '#f5c842', fillOpacity: 0.08
  }).addTo(map);
  setTimeout(() => { if (flashLayer) { map.removeLayer(flashLayer); flashLayer = null; } }, 2800);

  // 地図をスムーズに移動してポップアップを開く
  map.flyTo([shrine.lat, shrine.lng], Math.max(map.getZoom(), 11), { duration: 0.7 });
  setTimeout(() => marker.openPopup(), 650);
}

// ===== マーカー表示切り替え =====
function redrawMarkers() {
  markerList.forEach(({ marker, shrine }) => {
    const show = passesFilter(shrine);
    if (show && !map.hasLayer(marker)) marker.addTo(map);
    else if (!show && map.hasLayer(marker)) map.removeLayer(marker);
  });
  updateStats();
  renderList();
  updateAllToggleLabel();
}

function updateStats() {
  const n = markerList.filter(({ shrine }) => passesFilter(shrine)).length;
  document.getElementById('stats').textContent = `表示中 ${n} 社`;
}

function toggleFilter(type) {
  activeFilters.has(type) ? activeFilters.delete(type) : activeFilters.add(type);
  document.querySelector(`.filter-btn.${type}`).classList.toggle('active', activeFilters.has(type));
  persistFilters();
  redrawMarkers();
}

// ===== 全表示 / 全非表示（1つのボタンで両方を兼ねる） =====
const ALL_TAGS = ['jingu','taisha','ichi','ni','meisha','meisha2','meisha3','hachiman','inari','kinun','kaiun','sanpai'];
function showAll() {
  ALL_TAGS.forEach(t => {
    activeFilters.add(t);
    document.querySelector(`.filter-btn.${t}`).classList.add('active');
  });
  persistFilters();
  redrawMarkers();
}
function hideAll() {
  ALL_TAGS.forEach(t => {
    activeFilters.delete(t);
    document.querySelector(`.filter-btn.${t}`).classList.remove('active');
  });
  persistFilters();
  redrawMarkers();
}
function toggleAllFilters() {
  const allOn = ALL_TAGS.every(t => activeFilters.has(t));
  if (allOn) hideAll(); else showAll();
}
function updateAllToggleLabel() {
  const btn = document.getElementById('all-toggle-btn');
  if (!btn) return;
  const allOn = ALL_TAGS.every(t => activeFilters.has(t));
  btn.textContent = allOn ? '全非表示にする' : '全表示にする';
}

// ===== フィルターボタンの初期状態を反映 =====
function initFilterButtons() {
  ALL_TAGS.forEach(t => {
    const btn = document.querySelector(`.filter-btn.${t}`);
    if (btn) btn.classList.toggle('active', activeFilters.has(t));
  });
}

// ===== 「その他のタグ」展開パネル =====
const EXPAND_KEY = 'shrineMapFiltersExpanded_v1';
const EXTRA_TAGS = ['ni','meisha2','meisha3','hachiman','inari','kinun','kaiun'];
let filtersExpanded = localStorage.getItem(EXPAND_KEY) === '1'
  || EXTRA_TAGS.some(t => activeFilters.has(t)); // 前回そのタグが有効なら自動展開
function applyExpandState() {
  document.getElementById('more-filters').classList.toggle('expanded', filtersExpanded);
  const btn = document.getElementById('more-toggle-btn');
  btn.classList.toggle('expanded', filtersExpanded);
  btn.textContent = filtersExpanded ? '▴ 閉じる' : '▾ その他のタグ';
}
function toggleMoreFilters() {
  filtersExpanded = !filtersExpanded;
  try { localStorage.setItem(EXPAND_KEY, filtersExpanded ? '1' : '0'); } catch(e) {}
  applyExpandState();
  // ヘッダーの高さが変わる（アニメーション分の遅延後に地図サイズを再計算）
  setTimeout(() => map.invalidateSize(), 260);
}

// ===== 巡り達成チェック（一宮・神宮・大社） =====
// 一宮＝令制国ごとに1社でも参拝済みなら「その国は達成」（一宮巡りの作法に合わせる）
// 神宮・大社＝令制国と1:1対応しないので、1社ずつの単純な参拝チェックリスト
const ACHIEVE_TAGS = [
  { tag: 'ichi',   label: '一宮', mode: 'province', unit: '国' },
  { tag: 'jingu',  label: '神宮', mode: 'flat',      unit: '社' },
  { tag: 'taisha', label: '大社', mode: 'flat',      unit: '社' },
];
let currentAchieveTag = 'ichi';

function computeAchieveItems(tag) {
  return markerList
    .filter(({ shrine }) => shrine.tags.includes(tag))
    .map(({ shrine, idx }) => ({ shrine, idx, visited: isVisited(shrine) }));
}

function jumpToShrineFromAchieve(idx) {
  closeAchieveModal();
  focusShrine(idx, document.querySelector(`.shrine-item[data-idx="${idx}"]`));
}

// 地方ごとにグループ化した .achieve-prov-grid セクション群を body に描画する共通処理
// groups: [{ label, done, total, items: [{name, sub, done, idx}] }]
function renderAchieveGroups(groups) {
  const body = document.getElementById('achieve-body');
  body.innerHTML = '';
  groups.forEach(({ label, done, total, items }) => {
    if (items.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'achieve-region';
    const title = document.createElement('div');
    title.className = 'achieve-region-title';
    title.textContent = `${label}（${done}/${total}）`;
    sec.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'achieve-prov-grid';
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = 'achieve-prov' + (item.done ? ' done' : '');
      row.title = item.title || '';
      row.innerHTML = `
        <div class="achieve-prov-icon">✓</div>
        <div class="achieve-prov-name">${item.name}</div>
        <div class="achieve-prov-count">${item.sub}</div>`;
      row.addEventListener('click', () => jumpToShrineFromAchieve(item.idx));
      grid.appendChild(row);
    });
    sec.appendChild(grid);
    body.appendChild(sec);
  });
}

function renderProvinceMode(cfg, items) {
  const byProvince = {};
  items.forEach(item => {
    const prov = item.shrine.province;
    if (!byProvince[prov]) byProvince[prov] = [];
    byProvince[prov].push(item);
  });
  const provinces = Object.keys(byProvince);
  const doneCount = provinces.filter(p => byProvince[p].some(x => x.visited)).length;
  const total = provinces.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;

  document.getElementById('achieve-summary').innerHTML = `
    <span class="achieve-summary-num">${doneCount} / ${total} ${cfg.unit}</span>
    <span class="achieve-summary-label">の${cfg.label}を参拝済み（${pct}%）</span>
    <div class="achieve-bar-track"><div class="achieve-bar-fill" style="width:${pct}%"></div></div>`;

  const byRegion = {};
  provinces.forEach(prov => {
    const region = PROVINCE_REGION[prov] || 'その他';
    if (!byRegion[region]) byRegion[region] = [];
    byRegion[region].push(prov);
  });

  const groups = REGION_ORDER.map(region => {
    const provs = byRegion[region] || [];
    return {
      label: region,
      done: provs.filter(p => byProvince[p].some(x => x.visited)).length,
      total: provs.length,
      items: provs.map(prov => {
        const provItems = byProvince[prov];
        return {
          name: prov,
          sub: `${provItems.filter(x=>x.visited).length}/${provItems.length}`,
          done: provItems.some(x => x.visited),
          idx: provItems[0].idx,
          title: provItems.map(x => x.shrine.name).join('・'),
        };
      }),
    };
  });
  renderAchieveGroups(groups);
}

function renderFlatMode(cfg, items) {
  const doneCount = items.filter(x => x.visited).length;
  const total = items.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;

  document.getElementById('achieve-summary').innerHTML = `
    <span class="achieve-summary-num">${doneCount} / ${total} ${cfg.unit}</span>
    <span class="achieve-summary-label">の${cfg.label}を参拝済み（${pct}%）</span>
    <div class="achieve-bar-track"><div class="achieve-bar-fill" style="width:${pct}%"></div></div>`;

  const byRegion = {};
  items.forEach(item => {
    const region = PROVINCE_REGION[item.shrine.province] || 'その他';
    if (!byRegion[region]) byRegion[region] = [];
    byRegion[region].push(item);
  });

  const groups = REGION_ORDER.map(region => {
    const regionItems = byRegion[region] || [];
    return {
      label: region,
      done: regionItems.filter(x => x.visited).length,
      total: regionItems.length,
      items: regionItems.map(item => ({
        name: item.shrine.name,
        sub: item.shrine.pref,
        done: item.visited,
        idx: item.idx,
        title: item.shrine.pref,
      })),
    };
  });
  renderAchieveGroups(groups);
}

function renderAchieveTabs() {
  const tabs = document.getElementById('achieve-tabs');
  tabs.innerHTML = ACHIEVE_TAGS.map(t =>
    `<button class="achieve-tab ${t.tag === currentAchieveTag ? 'active' : ''}" data-tag="${t.tag}">${t.label}</button>`
  ).join('');
  tabs.querySelectorAll('.achieve-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentAchieveTag = btn.dataset.tag;
      renderAchieveBody();
    });
  });
}

function renderAchieveBody() {
  renderAchieveTabs();
  const cfg = ACHIEVE_TAGS.find(t => t.tag === currentAchieveTag);
  const items = computeAchieveItems(currentAchieveTag);
  if (cfg.mode === 'province') renderProvinceMode(cfg, items);
  else renderFlatMode(cfg, items);
}

function openAchieveModal() {
  currentAchieveTag = 'ichi';
  renderAchieveBody();
  document.getElementById('achieve-overlay').classList.add('open');
}
function closeAchieveModal() {
  document.getElementById('achieve-overlay').classList.remove('open');
}

// ===== サイドバー開閉 =====
let sidebarOpen = true;
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed', !sidebarOpen);
  document.getElementById('sidebar-open-btn').classList.toggle('visible', !sidebarOpen);
  setTimeout(() => map.invalidateSize(), 260);
}

applyExpandState();
initFilterButtons();
updateStats();
renderList();
updateAllToggleLabel();
// 初期表示時点で「その他のタグ」が展開済み（前回状態を復元）だと地図の描画領域が
// ヘッダー確定前のサイズで計算されてしまうため、レイアウト確定後に一度補正する
setTimeout(() => map.invalidateSize(), 50);
</script>
</body>
